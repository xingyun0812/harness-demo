name: PR Auto Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Doc Sync Check
        run: bash scripts/doc-sync-check.sh --ci

      - name: Checkstyle
        run: mvn checkstyle:check -q

      - name: PMD Check
        run: mvn pmd:check -q

      - name: Build and test with coverage
        run: mvn verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/

      - name: PR Review Comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## Auto Review Result')
            );
            
            const body = `## Auto Review Result
            
            ❌ **CI checks failed**
            
            Please fix the following before requesting review:
            - [ ] Doc sync check pass
            - [ ] Checkstyle pass
            - [ ] PMD (Alibaba p3c) pass
            - [ ] Tests pass (≥ 80% coverage)
            
            Run locally: \`mvn clean verify\`
            `;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
