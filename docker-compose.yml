services:
  harness-demo:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - SERVER_PORT=8080
    healthcheck:
      # Alpine (eclipse-temurin:17-jre-alpine) ships with BusyBox wget, not curl.
      # --spider only checks the URL without downloading the body.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
